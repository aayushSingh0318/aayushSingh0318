# This GitHub Action generates the "snake eating your contributions" SVG
# from your REAL contribution graph and publishes it to the `output` branch.
# Your README references it at:
#   https://raw.githubusercontent.com/aayushSingh0318/aayushSingh0318/output/snake.svg
#
# Place this file at: .github/workflows/snake.yml  (in the aayushSingh0318/aayushSingh0318 repo)

name: Generate Snake Animation

on:
  schedule:
    # Runs every 12 hours to keep the snake fresh
    - cron: "0 */12 * * *"
  # Allows manual run from the Actions tab
  workflow_dispatch:
  # Regenerates on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
